# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name zapart-obrazy.com www.zapart-obrazy.com;
    return 301 https://zapart-obrazy.com$request_uri;
}

# Redirect www → non-www
server {
    listen 443 ssl;
    server_name www.zapart-obrazy.com;

    ssl_certificate     /etc/letsencrypt/live/zapart-obrazy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zapart-obrazy.com/privkey.pem;

    return 301 https://zapart-obrazy.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name zapart-obrazy.com;

    ssl_certificate     /etc/letsencrypt/live/zapart-obrazy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zapart-obrazy.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location / {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        resolver 127.0.0.11 valid=30s;
        set $upstream http://frontend:3000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
